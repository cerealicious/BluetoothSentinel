name: Build Bluetooth Sentinel

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Self-Contained Single File
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothSentinel-Exe
          path: bin/Release/net8.0-windows10.0.22621.0/win-x64/publish/BluetoothSentinel.exe
